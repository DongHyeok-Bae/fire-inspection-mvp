<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>자율안전점검</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== 1. INIT 화면 ===== -->
  <div id="screen-init" class="screen active">
    <div class="init-content">
      <div class="init-icon">🔍</div>
      <h1>자율안전점검</h1>
      <p class="init-desc">점검 대상을 촬영하면<br>안전 상태를 자동으로 점검합니다</p>
      <button id="btn-start" class="btn-primary">시작하기</button>
    </div>
  </div>

  <!-- ===== 2. SELECT 화면 (항목 선택) ===== -->
  <div id="screen-select" class="screen">
    <h1 class="select-title">점검할 대상을 골라주세요</h1>
    <div class="item-grid">
      <button class="item-card" data-item="extinguisher">
        <div class="item-icon">🧯</div>
        <div class="item-label">소화기</div>
      </button>
      <button class="item-card" data-item="gastank">
        <div class="item-icon">🔵</div>
        <div class="item-label">가스통</div>
      </button>
      <button class="item-card" data-item="gashose">
        <div class="item-icon">〰️</div>
        <div class="item-label">가스호스</div>
      </button>
      <button class="item-card" data-item="pipe">
        <div class="item-icon">🔧</div>
        <div class="item-label">배관/전기</div>
      </button>
    </div>
  </div>

  <!-- ===== 3. CAMERA 화면 ===== -->
  <div id="screen-camera" class="screen">
    <video id="camera-video" autoplay playsinline muted></video>

    <!-- SVG 마스크 오버레이 (항목별 동적 교체) -->
    <div id="guide-overlay" class="guide-overlay">
      <svg id="overlay-svg" class="overlay-svg" viewBox="0 0 400 700" preserveAspectRatio="xMidYMid slice">
        <defs>
          <mask id="overlay-mask">
            <!-- 전체 흰색 (보이는 영역) -->
            <rect width="400" height="700" fill="white"/>
            <!-- 항목 형태 검정 (투명 컷아웃) — JS에서 동적으로 교체 -->
            <g id="mask-shape"></g>
          </mask>
        </defs>
        <!-- 반투명 어둡게 처리된 배경 (마스크 적용) -->
        <rect width="400" height="700" fill="rgba(0,0,0,0.5)" mask="url(#overlay-mask)"/>
        <!-- 점선 테두리 (항목 형태) — JS에서 동적으로 교체 -->
        <g id="guide-outline"></g>
      </svg>
    </div>

    <!-- 상단 안내 텍스트 -->
    <div id="guide-text" class="guide-text">
      점검 대상을 맞춰주세요
    </div>

    <!-- 상태 표시 바 -->
    <div id="status-bar" class="status-bar">
      <div id="status-dot" class="status-dot"></div>
      <span id="status-label">안정되게 들어주세요</span>
    </div>

    <!-- 카운트다운 숫자 -->
    <div id="countdown-display" class="countdown-display hidden">
      <span id="countdown-number">3</span>
    </div>

    <!-- 플래시 토글 -->
    <button id="btn-flash" class="btn-flash hidden" aria-label="플래시 토글">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    </button>

    <!-- 수동 촬영 버튼 (자이로 미지원 시) -->
    <button id="btn-manual-capture" class="btn-manual-capture hidden">촬영</button>

    <!-- 캡처 플래시 효과 -->
    <div id="capture-flash" class="capture-flash"></div>
  </div>

  <!-- ===== 4. REVIEW 화면 ===== -->
  <div id="screen-review" class="screen">
    <div class="review-image-wrap">
      <img id="review-image" src="" alt="촬영된 사진">
    </div>
    <div class="review-buttons">
      <button id="btn-submit" class="btn-review btn-submit">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span>이대로 제출하기</span>
      </button>
      <button id="btn-retake" class="btn-review btn-retake">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        <span>다시 찍기</span>
      </button>
    </div>
  </div>

  <!-- ===== 5. SUBMITTED 화면 ===== -->
  <div id="screen-submitted" class="screen">
    <div class="submitted-content">
      <div class="submitted-icon">✅</div>
      <h1>제출 완료!</h1>
      <p class="submitted-desc">사진이 성공적으로 제출되었습니다</p>
      <button id="btn-new" class="btn-primary btn-secondary">다른 항목 촬영</button>
    </div>
  </div>

  <!-- ===== 6. ERROR 화면 ===== -->
  <div id="screen-error" class="screen">
    <div class="error-content">
      <div class="error-icon">⚠️</div>
      <h1 id="error-title">카메라를 사용할 수 없습니다</h1>
      <p id="error-message" class="error-desc">설정에서 카메라 권한을 켜주세요</p>
      <button id="btn-retry" class="btn-primary">다시 시도</button>
    </div>
  </div>

  <script src="js/camera.js"></script>
  <script src="js/sensor.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/capture.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
